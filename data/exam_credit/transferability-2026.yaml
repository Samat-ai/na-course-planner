# NA Credit by Examination Transferability Chart
# Source: NA catalog 2026-2027, "Credits by Examination" (pp. 40-44, lines ~1411-1522).
# A maximum of 30 credit hours may be transferred by credit-by-examination (enforced by
# the resolver, not this data). equivalents: [] means generic elective credit ("ELEC 1"
# in the catalog). Course credit values are derived from the NA code convention by the
# resolver, so out-of-catalog equivalencies (CHEM/PHYS) need no credit field here.
#
# Data notes: catalog typo "CNEM 1311" corrected to CHEM 1311; CLEP Spanish Language
# ("ELEC 1 /SPAN 1311") mapped to the named course SPAN 1311.
