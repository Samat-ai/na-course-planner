default_min_grade: null

# ─────────────────────────────────────────────────────────────────────────────
# Source: NA catalog 2026-2027 §7.3.1 (degree requirements, pp. 117-118) and the
# course-description section. Structure: 36 gen-ed + 42 business core + 18
# concentration (choose one of Finance / International Business / Management) +
# 24 unrestricted electives = 120 credits.
#
# Like CS, the gen-ed groups encode the catalog's category minimums + program
# "specified" requirements (ECON 2311 forced; one GOVT; one MATH; one natural
# science). The catalog's full 36 gen-ed credits are reached by free choice
# within the categories; the forced minimums total less, with the remainder
# absorbed by the total-credit requirement + unrestricted electives (same
# modeling the shipped CS program uses).
# ─────────────────────────────────────────────────────────────────────────────
