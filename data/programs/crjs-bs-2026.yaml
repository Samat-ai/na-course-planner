# ─────────────────────────────────────────────────────────────────────────────
# REQUIREMENT GROUPS
# ─────────────────────────────────────────────────────────────────────────────
groups:
  # FRSH 1311 is "a required elective, part of the Elective hours" (catalog p.117),
  # not a standalone requirement group — it counts inside unrestricted_electives.

  # ── 2. Gen-Ed: Composition, Communications, and Foreign Languages ─────────
  - id: gen_ed_composition_comm
    name: "Gen-Ed: Composition, Communications, and Foreign Languages"
    kind: choose
    min_count: 3
    forced:
      - ENGL 1311
      - ENGL 1312
    forced_choices:  # catalog: COMM 1311 or COMM 1313
      - any_of:
          - COMM 1311
          - COMM 1313
    courses:
      - COMM 1311
      - COMM 1313
      - ENGL 1311
      - ENGL 1312
      - SPAN 1311

  # ── 3. Gen-Ed: Humanities and Fine Arts ──────────────────────────────────
  - id: gen_ed_humanities
    name: "Gen-Ed: Humanities and Fine Arts"
    kind: choose
    min_count: 2
    forced_choices:  # catalog: all undergraduates take one HIST course from this category
      - any_of:
          - HIST 1311
          - HIST 1312
          - HIST 2311
          - HIST 2314
    courses:
      - ARTS 1311
      - ENGL 2315
      - ENGL 2316
      - ENGL 2317
      - ENGL 2318
      - ENGL 2319
      - HIST 1311
      - HIST 1312
      - HIST 2311
      - HIST 2314
      - MUSI 1306
      - PHIL 1311
      - PHIL 1312
      - PHIL 1313

  # ── 4. Gen-Ed: Social and Behavioral Sciences ────────────────────────────
  - id: gen_ed_social
    name: "Gen-Ed: Social and Behavioral Sciences"
    kind: choose
    min_count: 2
    forced_choices:  # catalog: all undergraduates take one GOVT course from this category
      - any_of:
          - GOVT 2311
          - GOVT 2312
    courses:
      - ECON 2311
      - ECON 2312
      - GOVT 2311
      - GOVT 2312
      - PSYC 2311
      - SOCI 2311

  # ── 5. Gen-Ed: Natural Sciences and Mathematics ──────────────────────────
  # Catalog: all undergraduates take one MATH course and one natural science.
  - id: gen_ed_natural_science_math
    name: "Gen-Ed: Natural Sciences and Mathematics"
    kind: choose
    min_count: 2
    forced_choices:
      - any_of:
          - MATH 1311
          - MATH 1313
          - MATH 2314
      - any_of:
          - BIOL 1311
          - BIOL 1312
          - GEOG 2311
          - GEOG 2312
          - GEOL 1311
    courses: []

  # ── 5b. Gen-Ed: Additional (9 cr from any gen-ed category) ────────────────
  # Catalog requires 36 gen-ed credits; the four category minimums total 27,
  # leaving 9 cr of "additional general education" from any category.
  # Specificity 1 (subject-filtered) so it claims leftover gen-ed courses
  # before the unrestricted electives.
  - id: gen_ed_additional
    name: "Gen-Ed: Additional (any category)"
    kind: credits_from_filter
    min_credits: 9
    course_filter:
      subjects:
        - ARTS
        - COMM
        - ENGL
        - HIST
        - MUSI
        - PHIL
        - ECON
        - GOVT
        - PSYC
        - SOCI
        - SPAN
        - BIOL
        - GEOG
        - GEOL
        - MATH

  # ── 6. Criminal Justice Core (42 credits) ─────────────────────────────────
  - id: criminal_justice_core
    name: Criminal Justice Core
    kind: all_of
    courses:
      - CRJS 1301
      - CRJS 2302
      - CRJS 2303
      - CRJS 2304
      - CRJS 2305
      - CRJS 3306
      - CRJS 3307
      - CRJS 3308
      - CRJS 3309
      - CRJS 3310
      - CRJS 3311
      - CRJS 3312
      - CRJS 3313
      - CRJS 4322

  # ── 7. Concentration (Forensic Science, 18 credits) ──────────────────────
  - id: concentration
    name: Concentration (choose one)
    kind: choose_group
    choose_groups: 1
    subgroups:
      - id: concentration_forensic_science
        name: Forensic Science Concentration
        kind: all_of
        courses:
          - FORS 2329
          - FORS 3330
          - FORS 3331
          - FORS 3332
          - FORS 4333
          - FORS 4334

  # ── 8. Unrestricted Electives (24 credits) ────────────────────────────────
  # FRSH 1311 is "a required elective, part of the Elective hours" (catalog p.117).
  - id: unrestricted_electives
    name: Unrestricted Electives
    kind: credits_from_filter
    min_credits: 24
    forced:
      - FRSH 1311
    course_filter:
      unrestricted: true
