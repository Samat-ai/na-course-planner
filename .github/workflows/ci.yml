name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        # On Linux CI, `python`/`pip` are the real interpreter (the `py -3` quirk is
        # Windows-local only). Install the package if a pyproject exists yet; always
        # install ruff + pytest so CI works from the very first code PR.
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          if [ -f pyproject.toml ]; then pip install -e ".[dev]" || pip install -e .; fi

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest -q
