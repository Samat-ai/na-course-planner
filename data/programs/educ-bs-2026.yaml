# ─────────────────────────────────────────────────────────────────────────────
# REQUIREMENT GROUPS
# ─────────────────────────────────────────────────────────────────────────────
groups:
  # ── 1. Freshman Seminar ───────────────────────────────────────────────────
  - id: freshman_seminar
    name: Freshman Seminar
    kind: all_of
    courses:
      - FRSH 1311

  # ── 2. Gen-Ed: Composition, Communications, and Foreign Languages ─────────
  - id: gen_ed_composition_comm
    name: "Gen-Ed: Composition, Communications, and Foreign Languages"
    kind: choose
    min_count: 3
    forced:
      - ENGL 1311
      - ENGL 1312
    forced_choices:  # catalog: COMM 1311 or COMM 1313
      - any_of:
          - COMM 1311
          - COMM 1313
    courses:
      - COMM 1311
      - COMM 1313
      - ENGL 1311
      - ENGL 1312
      - SPAN 1311

  # ── 3. Gen-Ed: Humanities and Fine Arts ──────────────────────────────────
  # ENGL literature surveys are intentionally excluded here; they are owned by
  # the English Language Arts concentration (no double-counting).
  - id: gen_ed_humanities
    name: "Gen-Ed: Humanities and Fine Arts"
    kind: choose
    min_count: 2
    forced_choices:  # catalog: all undergraduates take one HIST course from this category
      - any_of:
          - HIST 1311
          - HIST 1312
          - HIST 2311
          - HIST 2314
    courses:
      - ARTS 1311
      - HIST 1311
      - HIST 1312
      - HIST 2311
      - HIST 2314
      - MUSI 1306
      - PHIL 1311
      - PHIL 1312
      - PHIL 1313

  # ── 4. Gen-Ed: Social and Behavioral Sciences ────────────────────────────
  - id: gen_ed_social
    name: "Gen-Ed: Social and Behavioral Sciences"
    kind: choose
    min_count: 2
    forced_choices:  # catalog: all undergraduates take one GOVT course from this category
      - any_of:
          - GOVT 2311
          - GOVT 2312
    courses:
      - ECON 2311
      - ECON 2312
      - GOVT 2311
      - GOVT 2312
      - PSYC 2311
      - SOCI 2311

  # ── 5. Gen-Ed: Natural Sciences and Mathematics ──────────────────────────
  # MATH requirement is MATH 1311 only so the Mathematics concentration's courses
  # are not absorbed into gen-ed (no double-counting).
  - id: gen_ed_natural_science_math
    name: "Gen-Ed: Natural Sciences and Mathematics"
    kind: choose
    min_count: 2
    forced:
      - MATH 1311
    forced_choices:
      - any_of:
          - BIOL 1311
          - BIOL 1312
          - GEOG 2311
          - GEOG 2312
          - GEOL 1311
    courses: []

  # ── 6. Education Core (36 credits) ────────────────────────────────────────
  # Elementary Education students substitute PHED 4320 for EDUC 4324 and
  # ARTS 3312 for EDUC 4321 (see caveats at the top of this file).
  - id: education_core
    name: Education Core
    kind: all_of
    courses:
      - EDUC 2311
      - EDUC 2312
      - EDUC 3314
      - EDUC 3315
      - EDUC 3316
      - EDUC 3317
      - EDUC 4318
      - EDUC 4320
      - EDUC 4321
      - EDUC 4324
      - COMP 1314
      - ENGL 3330

  # ── 7. Concentration (choose 1 of 4, 24 credits each) ────────────────────
  - id: concentration
    name: Concentration (choose one)
    kind: choose_group
    choose_groups: 1
    subgroups:
      - id: concentration_english_language_arts
        name: English Language Arts Concentration
        kind: all_of
        courses:
          - ENGL 2315
          - ENGL 2316
          - ENGL 2317
          - ENGL 2318
          - ENGL 2319
          - ENGL 3320
          - ENGL 3322
          - ENGL 3325

      - id: concentration_mathematics
        name: Mathematics Concentration
        kind: all_of
        courses:
          - MATH 1313
          - MATH 2314
          - MATH 2315
          - MATH 2316
          - MATH 2317
          - MATH 3318
          - MATH 3319
          - MATH 3320

      - id: concentration_physical_education
        name: Physical Education Concentration
        kind: all_of
        courses:
          - PHED 2311
          - PHED 2312
          - PHED 2313
          - PHED 2314
          - PHED 2315
          - PHED 3316
          - PHED 3317
          - PHED 3318

      - id: concentration_elementary_education
        name: Elementary Education Concentration
        kind: all_of
        courses:
          - ENGL 3328
          - ENGL 3329
          - MATH 3328
          - MATH 3329
          - EDUC 3331
          - EDUC 4332
          - EDUC 4335
          - EDUC 3102
          - EDUC 4101
          - EDUC 4133

  # ── 8. Unrestricted Electives (24 credits) ────────────────────────────────
  # Elementary Education has no free electives; its 24 elective credits are a
  # fixed required set (see caveats at the top of this file).
  - id: unrestricted_electives
    name: Unrestricted Electives
    kind: credits_from_filter
    min_credits: 24
    course_filter:
      unrestricted: true
