code: CRJS-BS
name: Bachelor of Science in Criminal Justice
catalog_year: 2026
total_credits_required: 120
default_min_grade: null

# ─────────────────────────────────────────────────────────────────────────────
# Source: NA catalog 2026-2027 §7.3.7 (degree requirements, pp. 129-131) and the
# course-description section. Structure: 36 gen-ed + 42 criminal justice core +
# 18 Forensic Science concentration + 24 unrestricted electives = 120 credits.
#
# Criminal Justice offers a single concentration (Forensic Science); it is still
# expressed as a choose_group/all_of subgroup for consistency with the other
# programs. Gen-ed encodes the catalog's standard category minimums (one HIST,
# one GOVT, one MATH, one natural science); see the CS/Business programs for the
# shared gen-ed credit-accounting note.
# ─────────────────────────────────────────────────────────────────────────────
