  # ── 8. Unrestricted Electives (24 credits) ────────────────────────────────
  # FRSH 1311 is "a required elective, part of the Elective hours" (catalog
  # p.117): forced. Concentration variants below add each track's required
  # electives; Elementary replaces this bucket entirely (no free electives).
  - id: unrestricted_electives
    name: Unrestricted Electives
    kind: credits_from_filter
    min_credits: 24
    forced:
      - FRSH 1311
    course_filter:
      unrestricted: true

# ─────────────────────────────────────────────────────────────────────────────
# CONCENTRATION VARIANTS — group edits applied once a concentration is DECLARED
# (catalog pp. 124-125). ⚠ ELA/Math/PE required-elective readings and the PE
# gen-ed science adjustment are best-effort pending advisor confirmation.
# ─────────────────────────────────────────────────────────────────────────────
concentration_variants:
  # Elementary Education (catalog p.124): fixed gen-ed, core substitutions, and
  # a fixed 24-cr required-elective set ("There are no free elective courses").
  concentration_elementary_education:
    removes:
      - gen_ed_composition_comm
      - gen_ed_humanities
      - gen_ed_social
      - gen_ed_natural_science_math
      - gen_ed_additional
      - unrestricted_electives
    groups:
      # "Must Take General Education Courses (36 credits)" — 10 named courses
      # plus an ECON choice and an ARTS/MUSI choice. The catalog line
      # "MUSI 1311 – Music Appreciation" is a known catalog typo for MUSI 1306.
      - id: gen_ed_elementary
        name: "Gen-Ed: Elementary Education fixed list"
        kind: choose
        min_count: 12
        forced:
          - FRSH 1311
          - ENGL 1311
          - ENGL 1312
          - COMM 1311
          - GOVT 2311
          - GOVT 2312
          - HIST 1311
          - HIST 1312
          - HIST 2311
          - MATH 1311
        forced_choices:
          - any_of:
              - ECON 2311
              - ECON 2312
          - any_of:
              - ARTS 1311
              - MUSI 1306
        courses: []

      # Core substitutions: PHED 4320 in place of EDUC 4324, ARTS 3312 in place
      # of EDUC 4321 (catalog p.123 parentheticals).
      - id: education_core
        name: Education Core (Elementary substitutions)
        kind: all_of
        courses:
          - EDUC 2311
          - EDUC 2312
          - EDUC 3314
          - EDUC 3315
          - EDUC 3316
          - EDUC 3317
          - EDUC 4318
          - EDUC 4320
          - ARTS 3312
          - PHED 4320
          - COMP 1314
          - ENGL 3330

      # "Must Take Elective Courses (24 credits)" — replaces the free bucket.
      # Catalog "PSYCH 2311" is a known catalog typo for PSYC 2311.
      - id: required_electives
        name: Required Electives (Elementary)
        kind: all_of
        courses:
          - EDUC 3201
          - EDUC 4434
          - EDUC 4699
          - BIOL 1311
          - HIST 2314
          - GEOG 2312
          - PSYC 2311

  # English Language Arts (catalog p.125): ENGL 3323/3326/4324/4327 are "part of
  # the English education curriculum and must be taken as an elective".
  concentration_english_language_arts:
    groups:
      - id: unrestricted_electives
        name: Electives (ELA required + free)
        kind: credits_from_filter
        min_credits: 24
        forced:
          - FRSH 1311
          - ENGL 3323
          - ENGL 3326
          - ENGL 4324
          - ENGL 4327
        course_filter:
          unrestricted: true

  # Mathematics (catalog p.125): MATH 3326/4322/4324 "must be taken as an elective".
  concentration_mathematics:
    groups:
      - id: unrestricted_electives
        name: Electives (Math required + free)
        kind: credits_from_filter
        min_credits: 24
        forced:
          - FRSH 1311
          - MATH 3326
          - MATH 4322
          - MATH 4324
        course_filter:
          unrestricted: true

  # Physical Education (catalog p.125): PHED 3311/3319/4320, BIOL 1311/1312 and
  # MATH 1312 "must be taken as an elective".
  concentration_physical_education:
    groups:
      - id: unrestricted_electives
        name: Electives (PE required + free)
        kind: credits_from_filter
        min_credits: 24
        forced:
          - FRSH 1311
          - PHED 3311
          - PHED 3319
          - PHED 4320
          - BIOL 1311
          - BIOL 1312
          - MATH 1312
        course_filter:
          unrestricted: true

      # ⚠ Consistency adjustment (best-effort): BIOL 1311/1312 are owned by the
      # PE required electives above, so the gen-ed science slot for PE students
      # offers the remaining science options only (no double-counting).
      - id: gen_ed_natural_science_math
        name: "Gen-Ed: Natural Sciences and Mathematics"
        kind: choose
        min_count: 2
        forced:
          - MATH 1311
        forced_choices:
          - any_of:
              - GEOG 2311
              - GEOG 2312
              - GEOL 1311
        courses: []
