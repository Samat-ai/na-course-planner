# ─────────────────────────────────────────────────────────────────────────────
# REQUIREMENT GROUPS
# ─────────────────────────────────────────────────────────────────────────────
groups:
  # ── 1. Gen-Ed: Composition, Communications, and Foreign Languages (≥3 courses, ≥9 cr) ──
  - id: gen_ed_composition_comm
    name: "Gen-Ed: Composition, Communications, and Foreign Languages"
    kind: choose
    min_count: 3
    forced:
      - ENGL 1311
      - ENGL 1312
    forced_choices:  # catalog footnote 6: COMM 1311 or COMM 1313
      - any_of:
          - COMM 1311
          - COMM 1313
    courses:
      - COMM 1311
      - COMM 1313
      - ENGL 1311
      - ENGL 1312
      - SPAN 1311

  # ── 3. Gen-Ed: Humanities and Fine Arts (≥2 courses, ≥6 cr) ─────────────
  - id: gen_ed_humanities
    name: "Gen-Ed: Humanities and Fine Arts"
    kind: choose
    min_count: 2
    forced_choices:  # catalog: all undergraduates take one HIST course from this category
      - any_of:
          - HIST 1311
          - HIST 1312
          - HIST 2311
          - HIST 2314
    courses:
      - ARTS 1311
      - ENGL 2315
      - ENGL 2316
      - ENGL 2317
      - ENGL 2318
      - ENGL 2319
      - HIST 1311
      - HIST 1312
      - HIST 2311
      - HIST 2314
      - MUSI 1306
      - PHIL 1311
      - PHIL 1312
      - PHIL 1313

  # ── 4. Gen-Ed: Social and Behavioral Sciences (≥2 courses, ≥6 cr) ────────
  - id: gen_ed_social
    name: "Gen-Ed: Social and Behavioral Sciences"
    kind: choose
    min_count: 2
    forced_choices:  # catalog footnote 4: one GOVT course (2311 or 2312)
      - any_of:
          - GOVT 2311
          - GOVT 2312
    courses:
      - ECON 2311
      - ECON 2312
      - GOVT 2311
      - GOVT 2312
      - PSYC 2311
      - SOCI 2311

  # ── 5. Gen-Ed: Natural Sciences and Mathematics (CS-specific: 3 courses) ──
  # Catalog: CS students take BOTH MATH 1311 and MATH 1313, plus one natural science
  # (BIOL 1311, BIOL 1312, GEOG 2311, GEOG 2312, or GEOL 1311). MATH 2314 (Calculus I)
  # is in this catalog category but is owned by the CS Core group, so it is not listed
  # here (no double-counting). A student who placed beyond MATH 1311 clears it via a
  # placement/transfer entry, not by dropping the requirement.
  - id: gen_ed_natural_science_math
    name: "Gen-Ed: Natural Sciences and Mathematics"
    kind: choose
    min_count: 3
    forced:
      - MATH 1311
      - MATH 1313
    forced_choices:
      - any_of:
          - BIOL 1311
          - BIOL 1312
          - GEOG 2311
          - GEOG 2312
          - GEOL 1311
    courses: []

  # ── 5b. Gen-Ed: Additional (6 cr from any gen-ed category) ─────────────────
  # Catalog requires 36 gen-ed credits; the four category minimums total 30, leaving
  # 6 cr of "additional general education" from any category. Specificity 1 (subject-
  # filtered) so it claims leftover gen-ed courses before the unrestricted electives.
  - id: gen_ed_additional
    name: "Gen-Ed: Additional (any category)"
    kind: credits_from_filter
    min_credits: 6
    course_filter:
      subjects:
        - ARTS
        - COMM
        - ENGL
        - HIST
        - MUSI
        - PHIL
        - ECON
        - GOVT
        - PSYC
        - SOCI
        - SPAN
        - BIOL
        - GEOG
        - GEOL
        - MATH

  # ── 6. CS Core (51 credits) ───────────────────────────────────────────────
  # COMP 1314 (3) + COMP 1411 (4) + COMP 1412 (4) + COMP 2313 (3) +
  # COMP 2415 (4) + COMP 2316 (3) + COMP 2319 (3) + COMP 3317 (3) +
  # COMP 3318 (3) + COMP 3320 (3) + COMP 3321 (3) + COMP 3322 (3) +
  # COMP 3324 (3) + MATH 1312 (3) + MATH 2314 (3) + MATH 2317 (3)
  # = 51 credits
  - id: cs_core
    name: CS Core
    kind: all_of
    courses:
      - COMP 1314
      - COMP 1411
      - COMP 1412
      - COMP 2313
      - COMP 2415
      - COMP 2316
      - COMP 2319
      - COMP 3317
      - COMP 3318
      - COMP 3320
      - COMP 3321
      - COMP 3322
      - COMP 3324
      - MATH 1312
      - MATH 2314
      - MATH 2317

  # ── 7. Concentration (choose 1 of 5, 18 credits each) ────────────────────
  - id: concentration
    name: Concentration (choose one)
    kind: choose_group
    choose_groups: 1
    subgroups:
      - id: concentration_networking
        name: Computer Networking Concentration
        kind: all_of
        courses:
          - COMP 4331
          - COMP 4351
          - COMP 4352
          - COMP 4353
          - COMP 4358
          - COMP 4393

      - id: concentration_cybersecurity
        name: Cybersecurity Concentration
        kind: all_of
        courses:
          - COMP 4353
          - COMP 4361
          - COMP 4362
          - COMP 4363
          - COMP 4364
          - COMP 4393

      - id: concentration_data_analytics
        name: Data Analytics Concentration
        kind: all_of
        courses:
          - COMP 4371
          - COMP 4372
          - COMP 4373
          - COMP 4374
          - COMP 4375
          - COMP 4393

      - id: concentration_software_engineering
        name: Software Engineering Concentration
        kind: all_of
        courses:
          - COMP 4331
          - COMP 4336
          - COMP 4337
          - COMP 4338
          - COMP 4339
          - COMP 4393

      - id: concentration_web_mobile
        name: Web and Mobile Application Development Concentration
        kind: all_of
        courses:
          - COMP 4325
          - COMP 4326
          - COMP 4327
          - COMP 4328
          - COMP 4329
          - COMP 4393

  # ── 8. Unrestricted Electives (15 credits) ────────────────────────────────
  # FRSH 1311 is "a required elective, part of the Elective hours" (catalog p.117).
  - id: unrestricted_electives
    name: Unrestricted Electives
    kind: credits_from_filter
    min_credits: 15
    forced:
      - FRSH 1311
    course_filter:
      unrestricted: true
