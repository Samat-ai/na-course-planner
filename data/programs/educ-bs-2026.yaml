# ─────────────────────────────────────────────────────────────────────────────
# Source: NA catalog 2026-2027 §7.3.3 (degree requirements, pp. 121-124) and the
# course-description section. Structure: 36 gen-ed + 36 education core + 24
# concentration (choose one of English Language Arts / Mathematics / Physical
# Education / Elementary Education) + 24 unrestricted electives = 120 credits.
#
# ── CONCENTRATION-DEPENDENT REQUIREMENTS (encoded via concentration_variants) ─
# The catalog varies gen-ed, core, and electives by concentration; those edits
# live in `concentration_variants` at the bottom of this file and apply once a
# concentration is DECLARED:
#   * Elementary Education (catalog p.124): fixed 36-cr "must take" gen-ed list,
#     core substitutions (PHED 4320 for EDUC 4324, ARTS 3312 for EDUC 4321), and
#     NO free electives — a fixed 24-cr required-elective set.
#   * English Language Arts / Mathematics / Physical Education (catalog p.125):
#     the courses marked "part of the X curriculum and must be taken as an
#     elective" are encoded as forced members of the elective bucket.
#     ⚠ BEST-EFFORT reading pending advisor confirmation: the catalog wording
#     doesn't say outright that every listed course is mandatory for its track.
#
# Two further best-effort choices keep the audit's single-allocation rule honest
# (a completed course satisfies at most one group):
#   * The gen-ed Humanities pool omits the ENGL literature surveys (ENGL 2315-2319);
#     they are owned by the English Language Arts concentration (catalog footnote 1).
#   * The gen-ed Natural-Sciences-and-Mathematics MATH requirement is MATH 1311
#     only, so the Mathematics concentration's courses are not pulled into gen-ed.
# ─────────────────────────────────────────────────────────────────────────────
