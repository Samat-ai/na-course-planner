code: EDUC-BS
name: Bachelor of Science in Interdisciplinary Studies in Education
catalog_year: 2026
total_credits_required: 120
default_min_grade: null

# ─────────────────────────────────────────────────────────────────────────────
# Source: NA catalog 2026-2027 §7.3.3 (degree requirements, pp. 121-124) and the
# course-description section. Structure: 36 gen-ed + 36 education core + 24
# concentration (choose one of English Language Arts / Mathematics / Physical
# Education / Elementary Education) + 24 unrestricted electives = 120 credits.
#
# ── KNOWN MODELING CAVEATS (Elementary Education track) ──────────────────────
# The catalog's Elementary Education concentration deviates from the rest of the
# program in ways the current program schema cannot express (it has no notion of
# concentration-dependent core or concentration-specific gen-ed). These are NOT
# encoded here; an Elementary Education student must apply them manually:
#   * Core substitutions: take PHED 4320 in place of EDUC 4324, and ARTS 3312 in
#     place of EDUC 4321.
#   * Gen-ed: a fixed "must take" list (incl. HIST 1311, HIST 1312, HIST 2311,
#     GOVT 2311, GOVT 2312, MATH 1311, ECON 2311 or 2312, ARTS 1311 or MUSI 1306).
#   * Electives: no free electives — the 24 elective credits are a fixed required
#     set (EDUC 3201, EDUC 4434, EDUC 4699, BIOL 1311, HIST 2314, GEOG 2312,
#     PSYC 2311).
#
# Two further best-effort choices keep the audit's single-allocation rule honest
# (a completed course satisfies at most one group):
#   * The gen-ed Humanities pool omits the ENGL literature surveys (ENGL 2315-2319);
#     they are owned by the English Language Arts concentration (catalog footnote 1).
#   * The gen-ed Natural-Sciences-and-Mathematics MATH requirement is MATH 1311
#     only, so the Mathematics concentration's courses are not pulled into gen-ed.
# ─────────────────────────────────────────────────────────────────────────────
