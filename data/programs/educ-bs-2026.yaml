# ─────────────────────────────────────────────────────────────────────────────
# REQUIREMENT GROUPS
# ─────────────────────────────────────────────────────────────────────────────
groups:
  # FRSH 1311 is "a required elective, part of the Elective hours" (catalog p.117),
  # not a standalone requirement group — it counts inside unrestricted_electives.
  # (For Elementary Education the catalog even lists FRSH inside its fixed 36-cr
  # gen-ed list; the per-concentration overlay work will refine this.)

  # ── 2. Gen-Ed: Composition, Communications, and Foreign Languages ─────────
  - id: gen_ed_composition_comm
    name: "Gen-Ed: Composition, Communications, and Foreign Languages"
    kind: choose
    min_count: 3
    forced:
      - ENGL 1311
      - ENGL 1312
    forced_choices:  # catalog: COMM 1311 or COMM 1313
      - any_of:
          - COMM 1311
          - COMM 1313
    courses:
      - COMM 1311
      - COMM 1313
      - ENGL 1311
      - ENGL 1312
      - SPAN 1311

  # ── 3. Gen-Ed: Humanities and Fine Arts ──────────────────────────────────
  # ENGL literature surveys are intentionally excluded here; they are owned by
  # the English Language Arts concentration (no double-counting).
  - id: gen_ed_humanities
    name: "Gen-Ed: Humanities and Fine Arts"
    kind: choose
    min_count: 2
    forced_choices:  # catalog: all undergraduates take one HIST course from this category
      - any_of:
          - HIST 1311
          - HIST 1312
          - HIST 2311
          - HIST 2314
    courses:
      - ARTS 1311
      - HIST 1311
      - HIST 1312
      - HIST 2311
      - HIST 2314
      - MUSI 1306
      - PHIL 1311
      - PHIL 1312
      - PHIL 1313

  # ── 4. Gen-Ed: Social and Behavioral Sciences ────────────────────────────
  - id: gen_ed_social
    name: "Gen-Ed: Social and Behavioral Sciences"
    kind: choose
    min_count: 2
    forced_choices:  # catalog: all undergraduates take one GOVT course from this category
      - any_of:
          - GOVT 2311
          - GOVT 2312
    courses:
      - ECON 2311
      - ECON 2312
      - GOVT 2311
      - GOVT 2312
      - PSYC 2311
      - SOCI 2311

  # ── 5. Gen-Ed: Natural Sciences and Mathematics ──────────────────────────
  # MATH requirement is MATH 1311 only so the Mathematics concentration's courses
  # are not absorbed into gen-ed (no double-counting).
  - id: gen_ed_natural_science_math
    name: "Gen-Ed: Natural Sciences and Mathematics"
    kind: choose
    min_count: 2
    forced:
      - MATH 1311
    forced_choices:
      - any_of:
          - BIOL 1311
          - BIOL 1312
          - GEOG 2311
          - GEOG 2312
          - GEOL 1311
    courses: []

  # ── 5b. Gen-Ed: Additional (9 cr from any gen-ed category) ────────────────
  # Catalog requires 36 gen-ed credits; the four category minimums total 27,
  # leaving 9 cr of "additional general education" from any category.
  # Specificity 1 (subject-filtered) so it claims leftover gen-ed courses
  # before the unrestricted electives.
  - id: gen_ed_additional
    name: "Gen-Ed: Additional (any category)"
    kind: credits_from_filter
    min_credits: 9
    course_filter:
      subjects:
        - ARTS
        - COMM
        - ENGL
        - HIST
        - MUSI
        - PHIL
        - ECON
        - GOVT
        - PSYC
        - SOCI
        - SPAN
        - BIOL
        - GEOG
        - GEOL
        - MATH

  # ── 6. Education Core (36 credits) ────────────────────────────────────────
  # Elementary Education students substitute PHED 4320 for EDUC 4324 and
  # ARTS 3312 for EDUC 4321 (see caveats at the top of this file).
  - id: education_core
    name: Education Core
    kind: all_of
    courses:
      - EDUC 2311
      - EDUC 2312
      - EDUC 3314
      - EDUC 3315
      - EDUC 3316
      - EDUC 3317
      - EDUC 4318
      - EDUC 4320
      - EDUC 4321
      - EDUC 4324
      - COMP 1314
      - ENGL 3330

  # ── 7. Concentration (choose 1 of 4, 24 credits each) ────────────────────
  - id: concentration
    name: Concentration (choose one)
    kind: choose_group
    choose_groups: 1
    subgroups:
      - id: concentration_english_language_arts
        name: English Language Arts Concentration
        kind: all_of
        courses:
          - ENGL 2315
          - ENGL 2316
          - ENGL 2317
          - ENGL 2318
          - ENGL 2319
          - ENGL 3320
          - ENGL 3322
          - ENGL 3325

      - id: concentration_mathematics
        name: Mathematics Concentration
